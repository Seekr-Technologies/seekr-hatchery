name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

permissions: read-all

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv sync
      - run: uv run ruff check .

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv sync
      - run: uv run pytest tests

  test-integration:
    name: Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    # quay.io/podman/stable is Fedora-based and pre-configured for rootless
    # Podman-in-container (fuse-overlayfs, user namespaces, storage config).
    # Matches the GitLab CI setup exactly.
    container:
      image: quay.io/podman/stable
      options: --privileged
    env:
      STORAGE_DRIVER: overlay
      BUILDAH_FORMAT: docker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: dnf install -y --quiet python3.12 git
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Verify Podman
        run: podman info
      - run: uv sync
      - name: Run integration tests
        run: uv run pytest tests/test_sandbox.py --integration -v
