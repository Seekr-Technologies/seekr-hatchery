name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

permissions: read-all

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync
      - run: uv run inv format --check

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync
      - run: uv run pytest tests

  test-integration:
    name: Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    # quay.io/podman/stable is Fedora-based and pre-configured for rootless
    # Podman-in-container (fuse-overlayfs, user namespaces, storage config).
    # Matches the GitLab CI setup exactly.
    container:
      image: quay.io/podman/stable
      options: --privileged
    env:
      STORAGE_DRIVER: overlay
      BUILDAH_FORMAT: docker
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install dependencies
        run: dnf install -y --quiet python3.12 git
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Verify Podman
        run: podman info
      - run: uv sync
      - name: Run integration tests
        run: uv run pytest tests/test_sandbox.py --integration -v
