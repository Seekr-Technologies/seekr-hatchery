name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

permissions: read-all

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync
      - run: uv run inv format --check

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync
      - run: uv run pytest tests

  test-integration:
    name: Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    # quay.io/podman/stable is Fedora-based and pre-configured for rootless
    # Podman-in-container (fuse-overlayfs, user namespaces, storage config).
    # Matches the GitLab CI setup exactly.
    container:
      image: quay.io/podman/stable
      options: --privileged
    env:
      STORAGE_DRIVER: overlay
      BUILDAH_FORMAT: docker
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: dnf install -y --quiet python3.12 git
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Verify Podman
        run: podman info
      - run: uv sync
      - name: Run integration tests
        run: uv run pytest tests/test_sandbox.py --integration -v
